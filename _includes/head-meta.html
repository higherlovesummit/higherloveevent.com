  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      { "@type": "Question", "name": "Who is Higher Love for?", "acceptedAnswer": { "@type": "Answer", "text": "Higher Love is for accomplished gay men who have built something meaningful in business and are looking for a peer group that matches both their professional caliber and their lived experience. Founders, executives, investors, and partners who are tired of being the only one in the room." } },
      { "@type": "Question", "name": "Can I bring my partner or spouse?", "acceptedAnswer": { "@type": "Answer", "text": "This gathering is designed as a space for gay men to connect with each other. The conversations, exercises, and experiences are built around the shared identity of being a gay man who leads. Austin is an incredible city and many attendees may choose to extend their trip with their partner before or after." } },
      { "@type": "Question", "name": "What will we actually do over three days?", "acceptedAnswer": { "@type": "Answer", "text": "Each day is designed around a different theme, blending structured peer advisory sessions with open conversation, wellness, and shared experiences. Curated roundtables, facilitated deep dives, morning movement and breathwork, creative expression, local excursions, and evening firepits." } },
      { "@type": "Question", "name": "What makes this different from other retreats?", "acceptedAnswer": { "@type": "Answer", "text": "Higher Love is designed from the ground up for accomplished gay men. The conversations, programming, and peer dynamics are all built around the specific intersection of identity, ambition, and lived experience. No code switching. No performing. Just the full version of who you are." } },
      { "@type": "Question", "name": "How many men will be in the room?", "acceptedAnswer": { "@type": "Answer", "text": "This is an intimate gathering by design. The founding cohort will be limited to a small group of men, likely between 15 and 25. This is not a conference with hundreds of people. Every man in the room will be personally vetted and every conversation will be personal." } },
      { "@type": "Question", "name": "What happens after I apply?", "acceptedAnswer": { "@type": "Answer", "text": "After you submit your application, Re Perez will personally review it. If there is a potential fit, you will be invited to a one on one conversation with Re. This is not a sales call. It is a genuine exploration of whether this gathering is right for you and whether you are right for the room." } }
