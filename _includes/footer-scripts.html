  <script>
    // FAQ accordion
    (function() {
      document.querySelectorAll('.faq-question').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var item = this.parentElement;
          var isOpen = item.classList.contains('open');
          document.querySelectorAll('.faq-item.open').forEach(function(el) {
            el.classList.remove('open');
            el.querySelector('.faq-question').setAttribute('aria-expanded', 'false');
          });
          if (!isOpen) {
            item.classList.add('open');
            this.setAttribute('aria-expanded', 'true');
          }
        });
      });
    })();

    // YouTube facade loader
    function loadYouTube(el) {
      var id = el.getAttribute('data-video-id');
      var title = el.getAttribute('data-title') || 'Video';
      var wrapper = el.querySelector('div');
      wrapper.innerHTML = '<div style="position: relative; padding-bottom: 56.25%; height: 0;">' +
        '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0" title="' + title + '" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe></div>';
      el.style.cursor = 'default';
      el.onclick = null;
    }
    window.loadYouTube = loadYouTube;

    // Video poster overlay + play
    var videoStarted = false;
    function playInvitationVideo() {
      var video = document.getElementById('optin-video');
      var overlay = document.getElementById('video-poster-overlay');
      if (!videoStarted && overlay && video) {
        videoStarted = true;
        overlay.style.opacity = '0';
        setTimeout(function() { overlay.style.display = 'none'; }, 500);
        video.controls = true;
        video.play();
        // Remove wrapper onclick so native controls work on mobile
        var wrapper = document.getElementById('video-wrapper');
        if (wrapper) { wrapper.removeAttribute('onclick'); wrapper.style.cursor = 'default'; }
      }
    }
    window.playInvitationVideo = playInvitationVideo;

    // Letter toggle
    function toggleLetter() {
      var letter = document.getElementById('invitation-letter');
      var toggleText = document.getElementById('letter-toggle-text');
      if (letter.style.display === 'none' || letter.style.display === '') {
        letter.style.display = 'block';
        toggleText.innerHTML = 'Hide the letter &uarr;';
      } else {
        letter.style.display = 'none';
        toggleText.innerHTML = 'Prefer to read? See the letter &darr;';
      }
    }
    window.toggleLetter = toggleLetter;

    // Floating CTA visibility
    (function() {
      var fab = document.getElementById('floatingCta');
      var hero = document.querySelector('.hero');
      var form = document.getElementById('application-form');
      if (!fab || !hero) return;
      function check() {
        var heroBottom = hero.getBoundingClientRect().bottom;
        var formTop = form ? form.getBoundingClientRect().top : Infinity;
        var show = heroBottom < 0 && formTop > window.innerHeight;
        fab.classList.toggle('visible', show);
      }
      window.addEventListener('scroll', check, { passive: true });
      check();
    })();

  </script>

  <!-- ENHANCED GA4 EVENT TRACKING -->
  <script>
  (function() {
    if (typeof gtag !== 'function') return;

    // --- 1. VIDEO TRACKING (Re's personal note video in hero) ---
    var heroVideo = document.getElementById('optin-video');
    if (heroVideo) {
      var _vidFired = false;
      var _vidMilestones = { 25: false, 50: false, 75: false, 90: false };

      heroVideo.addEventListener('play', function() {
        if (!_vidFired) {
          _vidFired = true;
          gtag('event', 'video_start', {
            event_category: 'video',
            video_title: 'Re Perez Personal Note'
          });
        }
      });

      heroVideo.addEventListener('timeupdate', function() {
        if (!heroVideo.duration) return;
        var pct = (heroVideo.currentTime / heroVideo.duration) * 100;
        [25, 50, 75, 90].forEach(function(m) {
          if (!_vidMilestones[m] && pct >= m) {
            _vidMilestones[m] = true;
            gtag('event', 'video_progress', {
              event_category: 'video',
              video_title: 'Re Perez Personal Note',
              video_percent: m
            });
          }
        });
      });

      heroVideo.addEventListener('ended', function() {
        gtag('event', 'video_complete', {
          event_category: 'video',
          video_title: 'Re Perez Personal Note'
        });
      });
    }

    // --- 2. CTA CLICK TRACKING (all Apply Now links) ---
    document.querySelectorAll('a[href="#application-form"], a[href="/#application-form"]').forEach(function(el) {
      el.addEventListener('click', function() {
        var loc = 'page';
        if (el.id === 'floatingCta' || el.closest('#floatingCta')) {
          loc = 'floating_mobile';
        } else if (el.closest('#nav')) {
          loc = 'nav';
        } else if (el.closest('.hero')) {
          loc = 'hero';
        } else if (el.closest('.re-closing-texture')) {
          loc = 'story_closing';
        } else if (el.classList.contains('cta-button')) {
          loc = 'section_cta';
        } else if (el.closest('footer')) {
          loc = 'footer';
        }
        gtag('event', 'cta_click', {
          event_category: 'conversion',
          cta_location: loc,
          cta_text: (el.textContent || '').trim().substring(0, 50)
        });
      });
    });

    // --- 3. STORY TOGGLE TRACKING ---
    // Note: onclick="toggleReStory()" fires first, so class reflects new state when our listener runs
    var _storyBtn = document.getElementById('re-story-btn');
    if (_storyBtn) {
      _storyBtn.addEventListener('click', function() {
        var isNowOpen = (document.getElementById('re-story-content') || {}).classList &&
                        document.getElementById('re-story-content').classList.contains('re-story-open');
        gtag('event', isNowOpen ? 'story_expand' : 'story_collapse', {
          event_category: 'engagement',
          content_name: 'Re Full Story'
        });
      });
    }

    // --- 4. SCROLL DEPTH MILESTONES ---
    var _scrollFired = { 25: false, 50: false, 75: false, 90: false };
    window.addEventListener('scroll', function() {
      var scrolled = window.scrollY + window.innerHeight;
      var total = document.documentElement.scrollHeight;
      if (!total) return;
      var pct = (scrolled / total) * 100;
      [25, 50, 75, 90].forEach(function(m) {
        if (!_scrollFired[m] && pct >= m) {
          _scrollFired[m] = true;
          gtag('event', 'scroll_depth', {
            event_category: 'engagement',
            scroll_percent: m
          });
        }
      });
    }, { passive: true });

    // --- 5. FAQ OPEN TRACKING ---
    document.querySelectorAll('.faq-question').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var qEl = btn.querySelector('.faq-q') || btn.querySelector('span') || btn;
        var qText = (qEl.textContent || '').replace(/[+\-×]/g, '').trim().substring(0, 80);
        // Only fire on open (not close)
        var item = btn.parentElement;
        if (!item.classList.contains('open')) {
          gtag('event', 'faq_open', {
            event_category: 'engagement',
            faq_question: qText
          });
        }
      });
    });

    // --- 6. APPLICATION FORM VISIBILITY ---
    var _formEl = document.getElementById('application-form');
    if (_formEl && 'IntersectionObserver' in window) {
      var _formSeen = false;
      var _formObs = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!_formSeen && entry.isIntersecting) {
            _formSeen = true;
            gtag('event', 'form_viewed', {
              event_category: 'conversion',
              form_name: 'Application Form'
            });
            _formObs.disconnect();
          }
        });
      }, { threshold: 0.3 });
      _formObs.observe(_formEl);
    }

    // --- 7. TIME ON PAGE MILESTONES ---
    [
      [30000,  30],
      [60000,  60],
      [120000, 120],
      [300000, 300]
    ].forEach(function(pair) {
      setTimeout(function() {
        gtag('event', 'time_on_page', {
          event_category: 'engagement',
          seconds_on_page: pair[1]
        });
      }, pair[0]);
    });

  })();
  </script>

  <!-- STICKY APPLY BAR: shows after scrolling past hero on mobile -->
  <script>
  (function() {
    var bar = document.getElementById('stickyApplyBar');
    var hero = document.querySelector('.hero');
    if (!bar || !hero) return;
    function checkBar() {
      var heroBottom = hero.getBoundingClientRect().bottom;
      if (heroBottom < 0) {
        bar.classList.add('is-visible');
      } else {
        bar.classList.remove('is-visible');
      }
    }
    window.addEventListener('scroll', checkBar, { passive: true });
    checkBar();
  })();
  </script>

  <!-- FADE-IN ON SCROLL OBSERVER -->
  <script>
  (function() {
    if (!('IntersectionObserver' in window)) {
      document.querySelectorAll('.fade-in').forEach(function(el) { el.classList.add('visible'); });
      return;
    }
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.05, rootMargin: '0px 0px -30px 0px' });

    document.querySelectorAll('.fade-in').forEach(function(el) {
      var rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        el.classList.add('visible');
      }
      observer.observe(el);
    });
  })();
  </script>
